name: AetherWidgets
options:
  bundleIdPrefix: com.revo

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.0.0

targets:
  AetherWidgets:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - AetherWidget.swift
          - AetherWidgetBundle.swift
          - AppIntent.swift
    resources:
      - path: GoogleService-Info.plist
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseAnalytics
      - target: AetherWidgetExtension
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.revo.aetherwidgets
      SWIFT_VERSION: "5.0"
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO

  AetherWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        includes:
          - AetherWidget.swift
          - AetherWidgetBundle.swift
          - AppIntent.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.revo.aetherwidgets.widget
      SWIFT_VERSION: "5.0"
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
