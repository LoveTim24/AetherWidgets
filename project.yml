name: AetherWidgets
options:
  bundleIdPrefix: com.revo
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.0.0
targets:
  AetherWidgets:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: 
      - AetherWidgets/AetherWidgets # هذا المسار الصحيح حسب صورك
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseAnalytics
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.revo.aetherwidgets
      CODE_SIGNING_ALLOWED: NO
