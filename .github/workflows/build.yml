name: Build IPA
on: [push]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: |
          curl -L https://github.com/yonaskolb/XcodeGen/releases/download/2.42.0/xcodegen.zip -o xcodegen.zip
          unzip xcodegen.zip
          sudo mv xcodegen/bin/xcodegen /usr/local/bin/xcodegen
          chmod +x /usr/local/bin/xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Resolve Firebase Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project AetherWidgets.xcodeproj \
            -scheme AetherWidgets

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project AetherWidgets.xcodeproj \
            -scheme AetherWidgets \
            -archivePath build.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build.xcarchive/Products/Applications/*.app Payload/
          zip -r AetherWidgets.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: App-IPA
          path: AetherWidgets.ipa
