name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-14 # استخدم إصداراً مستقراً كما في الويكي
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app # تحديد الإصدار يدوياً
      - name: Generate Project
        run: xcodegen generate
      - name: Build IPA
        run: |
          xcodebuild archive -project AetherWidgets.xcodeproj -scheme AetherWidgets -archivePath build.xcarchive -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO ENTITLEMENTS_REQUIRED=NO
          mkdir -p Payload
          cp -r build.xcarchive/Products/Applications/*.app Payload/
          zip -r AetherWidgets.ipa Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: App-IPA
          path: AetherWidgets.ipa
