name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode Project
        run: xcodegen generate
      - name: Build IPA
        run: |
          xcodebuild archive -scheme AetherWidgets -archivePath AetherWidgets.xcarchive -sdk iphoneos CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -r AetherWidgets.xcarchive/Products/Applications/*.app Payload/
          zip -r AetherWidgets.ipa Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: App-IPA
          path: AetherWidgets.ipa
